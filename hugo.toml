baseURL = "https://frdelib.org/"
canonifyURLs = true
languageCode = "en-us"
title = "Snail Knight"
description = "ശാസ്ത്രം, ദർശനം, ദൈവശാസ്ത്രം എന്നിവയുടെ പശ്ചാത്തലത്തിൽ മനുഷ്യാസ്തിത്വത്തെയും അതിഭൗതികതയെയും (മെറ്റാ ഫിസിക്സ്), ജ്ഞാനത്തെയും അപഗ്രഥിക്കുന്ന പ്രബന്ധങ്ങൾ; മനുഷ്യൻ എന്ന വ്യക്തിസത്തയുടെ (Human person) ധാർമ്മികമായ അർത്ഥത്തെയും പദവിയെയും കുറിച്ചുള്ള അന്വേഷണങ്ങൾ."
theme = "PaperMod"
googleAnalytics = "G-P7RW9BBDP2"
enableRobotsTXT = true
buildDrafts = false
buildFuture = false
buildExpired = false


[pagination]
  pagerSize = 12

[taxonomies]
  category = "categories"
  tag = "tags"

[permalinks]
  posts = "/posts/:year/:month/:slug/"

[params]
  hideSummary = true
  env = "production"
  customCSS = ["css/extended/mathbox.css"]
  defaultTheme = "auto"
  disableThemeToggle = false
  disableSpecial1stPost = true
  math = true

  ShowReadingTime = true
  ShowShareButtons = true
  shareButtons = ["twitter", "facebook", "whatsapp", "telegram", "reddit"]

  ShowCodeCopyButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowToc = true
  TocOpen = false

  mainSections = ["posts"]

  [params.katex]
    enable = true


[menu]
  [[menu.main]]
    name = "Posts"
    url = "posts/"
    weight = 1
  [[menu.main]]
    name = "Tags"
    url = "tags/"
    weight = 2
  [[menu.main]]
    name = "Search"
    url = "search/"
    weight = 3


[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
